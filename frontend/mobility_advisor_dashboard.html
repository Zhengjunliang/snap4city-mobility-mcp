<!DOCTYPE html>
<!--
Snap4City mobility advisor - dashboard front-end (Step 2: NL chat box + MCP bridge).
Paste this whole file into a widgetExternalContent (CKEditor, "Enable CKEditor" on).
NOTE: no leading indentation / blank lines on purpose - CKEditor renders leading
tabs/spaces as content, so this file is kept flat and paste-ready (see CLAUDE.md rule 9).
It is a natural-language chat box: the question is POSTed to the FastAPI bridge (api.py,
which wraps run_advisor on the JupyterHub) and the reply + route come back as widget JSON
{status, request_type, data, messages}. The reply bubble is messages[-1].content; the
routes are data.routes (one per travel mode), drawn on a sibling widgetMap.
JOB + POLL (L47): the bridge answers the POST with {job_id} at once and the turn is collected
by polling GET /advise/{job_id} (202 = still computing). A public-transport turn runs ~50-70s
and the reverse proxy chain cuts any single request past ~60s - and heartbeat streaming does
NOT help, because jupyter-server-proxy buffers the whole body of a non-SSE response. Do not
collapse this back into one long request (see send()). Each 202 carries the stage the turn is
in (understand / geocode / routing / routing_bus / respond) and its elapsed seconds; the
"thinking" bubble shows them (STAGE_TEXT), so a bus turn is not a blank bubble for a minute.
MULTIPLE MODES: when the user does not say walk/drive/bus, the backend routes ALL THREE (foot,
car AND public transport) and returns data.routes. We draw one vivid line per mode (foot green,
car blue, bus orange) -
there is no primary/alternate dimming and no legend. (Every route carries start/finish icons -
omitting them on some trajectories crashed the widget, so the markers overlap at the shared
O/D.) When only one route comes back (mode specified, or a mode empty / very short trip / no
PT for that OD), a single line is drawn.
ROUTE PICKER: a multi-mode turn fills the #advChips dock (a fixed strip between the chat
and the input row) with one mode-named chip per route ("A piedi" / "In auto" / "In
autobus" - distance/ETA already live in the reply text) plus "Mostra tutte": tapping a
chip redraws the map with ONLY that route, shows its pre-rendered step-by-step block
(data.routes[].detail, built backend-side from the audit) as a chat bubble, and toggles
the parking pins (car chip shows them, foot/bus hides them) - all LOCAL, no new backend
turn (a bus re-route costs 30-45s). The selection also echoes into the carried history so
follow-ups keep the chosen mode in context. Every routes-bearing turn REPLACES the dock
(a single-route turn empties it); a routes-less turn leaves it alone (map unchanged, the
chips still tell the truth). The dock hides itself when empty (CSS :empty).
HOW THE MAP DRAWS: every route goes through the widgetMap's MANUAL branch
(addCustomTrajectory with per-point mode.routing.manual): the widget just connects the given
points with straight segments, so we feed it the backend's own route geometry and the map
NEVER calls a router - the line appears together with the reply, straight from the /advise
response (ONE router call per mode in total, backend-side; L44). A bus route ships its
walk/ride split as per-leg geometry (route.legs, cut by the backend on the pt instructions'
interval); foot/car draw the whole route WKT as a single leg. Each straight segment takes the
CURRENT point's color (a STRING in the manual branch). A point's non-empty icon becomes a
marker: start/finish flags on the precise geocoded origin/destination
(data.origin/data.destination - pinned on the real civic address, not the routing service's
road-snapped WKT endpoint, which drifts ~27 m up the street; the WKT endpoints are only a
fallback), and Gea-Night's bus pin (TransferServiceAndRenting_Urban_bus) on the ride
boundaries (board/alight stops). EVERY point must carry `mode` and an `icon` field (empty
string = no marker) or the map crashes in addCustomTrajectoryToMap - the old L30 crash was a
missing icon field. A ride leg carries the real GTFS shape (backend swap via the km4city tpl
API, L51); when no variant matches it degrades to the router's stop-to-stop chords (L44).
PARKING (car routes): data.parking lists car parks near the destination; each is plotted on the
map via the widgetMap "addSelectorPin" event (one per serviceUri, Snap4City's own pin pattern).
No list in the chat: the reply text already sums up the availability in one sentence (L37).
SERVICES (user-asked category, L53): routes[i].services lists services along that route (bus:
near board/alight stops + walking legs); same addSelectorPin pipeline, violet pins - the widget
resolves each serviceUri itself and renders the service's own category icon, so pharmacy pins
look like pharmacies with zero icon code here. The chips picker swaps the set per shown route.
GPS (near-me): each send fetches the browser geolocation (getCurrentPosition, 5s timeout, 60s
cache) and POSTs it as `gps: {lat, lng}` (null on denial/unsupported/blocked). The backend uses
it to start the trip from the user's position when no origin is given and to pick the nearest
geocode/service candidate. A permission denial is remembered for the session (no re-prompt).
NOTE: this widget runs in the dashboard iframe - if the parent iframe lacks allow="geolocation"
(a Snap4City platform setting, ask the referente) the permission prompt never appears and every
turn silently degrades to the no-GPS flow (the advisor then asks for the origin explicitly).
Configure MAP_WIDGET_ID and BRIDGE_BASE below.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<style>
/* Every selector MUST stay .adv-scoped: this file is pasted straight into the dashboard DOM
(not an iframe), so a bare html/body/tag rule styles the WHOLE dashboard - an "html, body"
rule once wiped the widget title bar and gave the parent page a ghost scrollbar (L37,
CLAUDE.md rule 9). The .adv box fills the host container on its own (position: absolute). */
.adv { font-family: Arial, Helvetica, sans-serif; color: #e8ecf4; background: #1b2a4d; padding: 8px; display: flex; flex-direction: column; position: absolute; top: 0; right: 0; bottom: 0; left: 0; box-sizing: border-box; }
.adv #advChat { flex: 1; overflow-y: auto; min-height: 0; padding-right: 4px; }
.adv .msg { margin: 6px 0; padding: 7px 10px; border-radius: 10px; font-size: 13px; line-height: 1.35; max-width: 90%; white-space: pre-wrap; word-wrap: break-word; }
.adv .msg.user { background: #1f2a44; border: 1px solid #f5c518; color: #f5c518; margin-left: auto; }
.adv .msg.bot { background: #28324d; border: 1px solid #3a4564; }
.adv .msg.err { background: #3a2330; border: 1px solid #ff8a8a; color: #ff8a8a; }
.adv .row { display: flex; gap: 6px; margin-top: 8px; }
.adv #advInput { flex: 1; box-sizing: border-box; padding: 8px; border: none; border-radius: 4px; font-size: 13px; }
.adv #advSend { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; background: #f5c518; color: #1f2a44; }
.adv #advSend:disabled { opacity: .5; cursor: default; }
.adv .msg.thinking { color: #9aa6b8; font-style: italic; animation: advPulse 1.2s ease-in-out infinite; }
.adv #advChips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.adv #advChips:empty { display: none; }
.adv .chip { padding: 6px 10px; border: 1px solid #3a4564; border-radius: 14px; background: #28324d; color: #e8ecf4; font-size: 12px; font-family: inherit; cursor: pointer; }
.adv .chip.sel { background: #f5c518; border-color: #f5c518; color: #1f2a44; font-weight: bold; }
@keyframes advPulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="adv">
<div id="advChat"></div>
<div id="advChips"></div>
<div class="row">
<input id="advInput" type="text" autocomplete="off">
<button id="advSend" type="button">Invia</button>
</div>
</div>
<script>
$(function () {
'use strict';
// ---- Configuration (fill these on your dashboard) -----------------------
var MAP_WIDGET_ID = "w_Map_5183_widgetMap46852";  // id of the widgetMap on this dashboard
// FastAPI bridge (api.py) base URL, as reachable FROM THE BROWSER. On a dashboard this is
// whatever the deployment exposes (jupyter-server-proxy path or a same-origin proxy);
// TODO set this once the browser->bridge reachability is decided. Local dev: localhost.
var BRIDGE_BASE = "https://www.snap4city.org/jupyterhub/user/mobilityadvisor/proxy/8010";
// One fixed trajectory id per vehicle so a re-draw replaces that line, and every turn
// we clear all of them (a turn with only foot must wipe a stale car line, and vice versa).
var TRAJ_IDS = { foot: "advisorRoute_foot", car: "advisorRoute_car", bus: "advisorRoute_bus" };
var ICON_BASE = "https://www.snap4city.org/snap4cityWebAppTuscany/img/mapicons/ita/";
var ICONS = { start: ICON_BASE + "FirstStopOfRoute.png", finish: ICON_BASE + "LastStopOfRoute.png" };
// Parking pins (car routes): the widgetMap "addSelectorPin" event plots a service by its
// km4city serviceUri - Snap4City's own code fires one per pin in a loop, so we do the same
// (one event per car park). The `query` is a ServiceMap API URL; the docs show an individual
// device is selected with "?serviceUri=<URI>" (a category query "?categories=Car_park" would
// plot ALL of them, which we avoid). Base = the public ServiceMap (same as mcp_server.py).
// REMOVAL (verified in widgetMap.php, disit/dashboard-builder): the map keys each pin layer
// by passedData.desc (gisLayersOnMap[desc]; empty desc falls back to query), and its
// 'removeSelectorPin' handler looks up THAT desc and also dereferences passedData.query
// unguarded - so removal must resend the SAME desc + query (+ display) used on add.
// Our first version sent only {query, queryType}: desc came out undefined, the lookup
// missed, and pins piled up forever (L52). Same-name car parks collide on the desc key
// (the widget dedups adds by desc) - rare, accepted.
var SERVICEMAP_BASE = "https://servicemap.disit.org/WebAppGrafo/api/v1/";
var PARK_PIN = { color1: "#1e66ff", color2: "#1e66ff", pinattr: "square", display: "pins", queryType: "Default" };
// Along-route service pins (violet): same pipeline and pinattr as parking (known-good values,
// L30 warns unsupported ones crash the widget); the category icon inside the pin comes from
// the widget's own serviceUri lookup, not from us.
var SERVICE_PIN = { color1: "#8e44ad", color2: "#8e44ad", pinattr: "square", display: "pins", queryType: "Default" };
// One vivid color per vehicle (foot green, car blue, bus orange). Every drawn route uses
// its mode color; there is no primary/alternate dimming. In the manual branch each segment
// reads the current point's color as a plain STRING. (Line width is left alone: the
// widgetMap may not support a width field and L30 warns unsupported fields crash it.)
var MODE_COLORS = { foot: "#2ecc71", car: "#1e66ff", bus: "#ff7f00" };
// Italian chip labels for the route picker, keyed by the front-end vehicle family.
var MODE_LABELS = { foot: "A piedi", car: "In auto", bus: "In autobus" };
// ---- State --------------------------------------------------------------
var history = [];  // conversation messages carried turn to turn (run_advisor contract)
var gpsDenied = false;  // remembered PERMISSION_DENIED: skip further prompts this session
// ---- Browser geolocation -------------------------------------------------
// Always calls cb exactly once: {lat, lng} on success, null on ANY failure (no API,
// remembered denial, iframe permissions-policy block, timeout). enableHighAccuracy off +
// maximumAge 60s: a fresh-ish city-level fix per send is enough for nearest-place picking.
// A prefetch at load (bottom of this script) raises the permission prompt BEFORE the first
// send: getCurrentPosition's timeout can fire while the prompt is still open, so without the
// prefetch the first turn races the user's Allow click and goes out with gps null.
// Failures log to the IFRAME console (select the widget iframe in DevTools to see them):
// err.code 1 = denied by user or by a missing allow="geolocation" on the parent iframe,
// 2 = position unavailable, 3 = timeout.
function getGps(cb) {
if (gpsDenied || !navigator.geolocation) { cb(null); return; }
try {
navigator.geolocation.getCurrentPosition(function (pos) {
cb({ lat: pos.coords.latitude, lng: pos.coords.longitude });
}, function (err) {
if (err && err.code === 1) gpsDenied = true;  // PERMISSION_DENIED (user or iframe policy)
if (window.console) console.warn("[advisor] gps unavailable, code=" + (err && err.code) + " " + (err && err.message));
cb(null);
}, { timeout: 10000, maximumAge: 60000, enableHighAccuracy: false });
} catch (e) {
if (window.console) console.warn("[advisor] geolocation threw (permissions-policy?): " + e);
cb(null);
}
}
// ---- Chat UI ------------------------------------------------------------
function addMsg(text, kind) {
var $m = $("<div>").addClass("msg " + kind).text(text);
$("#advChat").append($m);
$("#advChat").scrollTop($("#advChat")[0].scrollHeight);
return $m;
}
// The advisor's own reply: the last assistant turn's content (OpenAI standard); no
// hardcoded route formatting - respond already phrased distance/ETA into the text.
function replyOf(response) {
var msgs = response.messages || [];
for (var i = msgs.length - 1; i >= 0; i--) {
if (msgs[i].role === "assistant" && typeof msgs[i].content === "string" && msgs[i].content.trim()) {
return msgs[i].content.trim();
}
}
return "(nessuna risposta)";
}
// ---- Route option picker (multi-mode turns) -------------------------------
// Chip label = mode name only ("In auto"): distance/ETA already live in the reply text.
function chipLabel(route) {
return MODE_LABELS[vehicleOf(route.mode)] || "Percorso";
}
// Fill the #advChips dock: one chip per returned route + "Mostra tutte". Selection is
// PURELY LOCAL - no new backend turn (a bus re-route costs 30-45s, L31): the chip redraws
// the map with ONLY that route, shows its pre-rendered route.detail (backend-built step
// block) in a bot bubble, and toggles the parking pins (car shows, foot/bus hides;
// "Mostra tutte" restores lines and pins). routes/origin/destination/parking live in this
// closure; renderTurn empties the dock on every routes-bearing turn, so stale chips (and
// their closures) simply disappear. Clicks are ignored while a turn is in flight:
// renderTurn's `history = response.messages` would drop entries pushed mid-flight, and
// the incoming turn redraws the map anyway. The selection echoes into the chat, and ONLY
// the user echo line into `history` (the detail block stays a bubble): one line is enough
// for a follow-up's understand to keep the chosen mode in context, at minimal LLM cost.
function addChoices(routes, origin, destination, parking) {
var $box = $("#advChips");
routes.forEach(function (route) {
var label = chipLabel(route);
var $chip = $("<button>").attr("type", "button").addClass("chip").text(label);
$chip.on("click", function () {
if (inFlight || $chip.hasClass("sel")) return;
try { drawRoutes([route], origin, destination); }
catch (e) { addMsg("(percorso non disegnabile: " + e.message + ")", "err"); return; }
if (vehicleOf(route.mode) === "car") drawParkingPins(parking);
else clearParkingPins();
drawServicePins(route.services || []);
$box.find(".chip").removeClass("sel");
$chip.addClass("sel");
var echo = "Scelgo l'opzione: " + label;
var text = route.detail || label;
addMsg(echo, "user");
addMsg(text, "bot");
// Only the USER echo goes into the carried history: that one line is all a follow-up's
// understand needs to keep the chosen mode in context, while the detail block (stop
// lists, streets) would ride into every later LLM prompt as a few hundred tokens of
// noise on a gateway that is already minute-slow on bad days (L54). The bubble above
// still shows the full detail. Re-selecting the same option (after "Mostra tutte"
// cleared .sel) must not stack identical echoes.
var prev = history.length ? history[history.length - 1] : null;
if (!prev || prev.role !== "user" || prev.content !== echo) {
history.push({ role: "user", content: echo });
}
});
$box.append($chip);
});
var $all = $("<button>").attr("type", "button").addClass("chip").text("Mostra tutte");
$all.on("click", function () {
if (inFlight) return;
try { drawRoutes(routes, origin, destination); }
catch (e) { addMsg("(percorso non disegnabile: " + e.message + ")", "err"); return; }
drawParkingPins(parking);
drawServicePins(allServices(routes));
$box.find(".chip").removeClass("sel");
});
$box.append($all);
}
// ---- Map drawing (widgetMap manual branch via addCustomTrajectory) -------
// The backend route mode (foot/car/public_transport) maps to the front-end vehicle
// family (trajectory ids, colors).
function vehicleOf(mode) {
if (mode === "car") return "car";
if (mode === "public_transport") return "bus";
return "foot";  // foot / unset
}
// WKT is "LINESTRING(lng lat, ...)"; the map wants {lat, lng}, so swap (coord-order trap).
function parseWktLine(wkt) {
var m = /LINESTRING\s*\(([^)]*)\)/i.exec(wkt || "");
if (!m) return [];
return m[1].split(",").map(function (pair) {
var xy = pair.trim().split(/\s+/);
return { lat: parseFloat(xy[1]), lng: parseFloat(xy[0]) };
}).filter(function (p) { return isFinite(p.lat) && isFinite(p.lng); });
}
// The widget runs in an iframe; the dashboard (and its widgets) live in parent.
function trigger(payload) {
if (window.parent && window.parent.$) window.parent.$("body").trigger(payload);
else throw new Error("dashboard host not reachable");
}
// Wipe every per-vehicle trajectory so the previous turn leaves nothing behind (a foot-only
// answer must erase last turn's car line, and vice versa).
function clearAllTrajectories() {
$.each(TRAJ_IDS, function (vehicle, id) {
trigger({
type: "removeCustomTrajectory",
target: MAP_WIDGET_ID,
passedData: [{ id: id, eventType: "Trajectory" }]
});
});
}
// Gea-Night's board/alight pin (same icon dir as ICONS): blue rounded square, white bus.
var BUS_STOP_ICON = ICON_BASE + "TransferServiceAndRenting_Urban_bus.png";
// Per-leg segment color: walking legs green, ride legs orange, a whole car leg blue.
function legColor(type) { return MODE_COLORS[type] || MODE_COLORS.foot; }
// Build one MANUAL-branch trajectory for a route: every point carries mode.routing.manual,
// and the widget connects consecutive points with straight segments, each segment taking
// the CURRENT point's color (a STRING here) - so the backend geometry paints exactly as
// computed, with NO router call from the widget. A bus route brings its walk/ride split
// as route.legs (backend-cut, L44); foot/car draw the whole route WKT as one leg of their
// mode color. Adjacent legs share their boundary vertex; the duplicate is dropped so the
// segments stay connected, and ride boundaries (board/alight stops) get the bus pin.
// Start/finish flags go on the precise geocoded origin/destination (real civic address);
// the WKT endpoints already sit in the geometry as plain vertices. EVERY point carries an
// `icon` field (empty string = no marker): a missing icon was the L30 crash. Returns the
// object - the caller batches all routes into ONE event (see drawRoutes).
function buildTraj(route, origin, destination) {
var vehicle = vehicleOf(route.mode);
var legs = (route.legs && route.legs.length) ? route.legs : [{ type: vehicle, wkt: route.wkt }];
var points = [];
function push(gps, col, icon) {
points.push({ optionalhtmltrajpopup: "", mode: { routing: { manual: true } }, color: col, icon: icon, position: { serviceUri: "", gps: gps } });
}
if (origin) push(origin, legColor(legs[0].type), ICONS.start);
var legStarted = false;
legs.forEach(function (leg) {
var col = legColor(leg.type);
var line = parseWktLine(leg.wkt);
if (!line.length) return;
if (legStarted) {
// Shared boundary vertex (already appended): a ride starting here gets its board
// pin on it; never clobber a start/finish flag.
if (leg.type === "bus" && points[points.length - 1].icon === "") points[points.length - 1].icon = BUS_STOP_ICON;
line = line.slice(1);
}
var first = points.length;
line.forEach(function (gps) { push(gps, col, ""); });
if (leg.type === "bus" && points.length > first) {
if (!legStarted && points[first].icon === "") points[first].icon = BUS_STOP_ICON;
points[points.length - 1].icon = BUS_STOP_ICON;
}
legStarted = true;
});
if (destination) push(destination, legColor(legs[legs.length - 1].type), ICONS.finish);
if (points.length < 2) throw new Error("route geometry has < 2 points");
return { id: TRAJ_IDS[vehicle], eventType: "Trajectory", points: points };
}
// Draw every route from the backend, one vivid line per mode (foot green / car blue; bus =
// walking legs green, ride leg orange, ServiceMap bus-stop pins at the board/alight
// points) - no primary/alternate distinction, no dimming. ALL trajectories go in ONE
// addCustomTrajectory event (passedData is an array): the widget replaces its whole trajectory
// layer on each event, so separate events would let the last wipe the others. The markers use
// the precise geocoded origin/destination so every mode's start/finish pins land on the real
// address (and overlap exactly). One route (a mode empty / specified) just draws a single line.
function drawRoutes(routes, origin, destination) {
clearAllTrajectories();
var trajs = routes.map(function (route) {
return buildTraj(route, origin, destination);
});
trigger({ type: "addCustomTrajectory", target: MAP_WIDGET_ID, passedData: trajs });
}
// ---- Parking near the destination (car routes) --------------------------
// Map pins via addSelectorPin (one event per car park, by serviceUri - Snap4City's own widget
// loops one event per pin, so we do too). Removal is the verified 'removeSelectorPin' event
// keyed by desc (see the config note above): each set's pins list remembers every added
// pin's {desc, query} so the clear resends exactly those. try/catch keeps any widget balk
// away from the chat (the reply text still states the availability).
function serviceQuery(uri) { return SERVICEMAP_BASE + "?serviceUri=" + encodeURIComponent(uri); }
// One shared clear/draw pipeline for both pin sets; parking and along-route services
// (user-asked category, L53) differ only in pin config, default label and bookkeeping.
// Separate sets so they clear independently (a chip tap swaps the service set but only
// toggles parking). Same-name items collide on the widget's desc key - rare, accepted.
var parkingPins = { cfg: PARK_PIN, label: "Parcheggio", pins: [] };
var servicePins = { cfg: SERVICE_PIN, label: "Servizio", pins: [] };
function clearPins(set) {
try {
set.pins.forEach(function (pin) {
trigger({ type: "removeSelectorPin", target: MAP_WIDGET_ID, passedData: { desc: pin.desc, query: pin.query, display: set.cfg.display } });
});
} catch (e) { /* widget balked; never break the chat */ }
set.pins = [];
}
function drawPins(set, items) {
clearPins(set);
if (!items || !items.length) return;
try {
items.forEach(function (p) {
if (!p.uri) return;
var desc = p.name || set.label;
var query = serviceQuery(p.uri);
trigger({ type: "addSelectorPin", target: MAP_WIDGET_ID, passedData: {
query: query, queryType: set.cfg.queryType, display: set.cfg.display,
desc: desc, color1: set.cfg.color1, color2: set.cfg.color2,
pinattr: set.cfg.pinattr
} });
set.pins.push({ desc: desc, query: query });
});
} catch (e) { /* widget balked; the reply text still stands on its own */ }
}
function clearParkingPins() { clearPins(parkingPins); }
function drawParkingPins(parking) { drawPins(parkingPins, parking); }
function drawServicePins(services) { drawPins(servicePins, services); }
// Union of every route's services, deduped by uri (routes share stretches, so the same
// service can ride on more than one route's list).
function allServices(routes) {
var seen = {}, out = [];
(routes || []).forEach(function (route) {
(route.services || []).forEach(function (s) {
if (!s.uri || seen[s.uri]) return;
seen[s.uri] = true;
out.push(s);
});
});
return out;
}
// ---- Send a turn to the bridge (job + poll) ------------------------------
// The bridge does NOT answer the turn on the POST: a public-transport turn takes ~50-70s
// (the online router rebuilds its PT graph per bus request) and the reverse proxy chain in
// front cuts any single request past ~60s. Streaming heartbeat bytes does NOT fix that -
// jupyter-server-proxy buffers the whole response body unless the request is an SSE one, so
// nothing reaches the proxy before the turn ends (L47). So: POST /advise starts the job and
// returns {job_id} at once, then we poll GET /advise/{job_id} (202 = still computing, 200 =
// the widget JSON). Every HTTP call is sub-second, so no proxy can time it out. NEVER turn
// this back into one long request.
var POLL_MS = 1500;         // gap between polls
// Give up after this. Sized on a MEASURED worst turn (L54): understand LLM 67s + bus
// routing 33-45s + along-route services + respond LLM ~60s can pass 240s while the job
// is still healthily running server-side — the window must cover the real tail latency.
var POLL_MAX_MS = 420000;
// What the bridge's 202 stage means, in the user's language. The turn reports where it is in
// the graph (understand -> geocode -> routing -> respond); a bus route gets its own line
// because it is the one that makes the user wait (~30-45s: the router rebuilds its
// public-transport graph on every bus request until referente merges the perf patch). An
// unknown stage falls back to the generic bubble, so a new backend stage never blanks the line.
var STAGE_TEXT = {
start: "Sto pensando…",
understand: "Sto capendo la richiesta…",
geocode: "Cerco gli indirizzi…",
routing: "Calcolo il percorso…",
routing_bus: "Calcolo il percorso in bus (può richiedere un minuto)…",
services: "Cerco i servizi lungo il percorso…",
respond: "Preparo la risposta…"
};
// The bubble text for a 202 body. The seconds only appear once the turn is visibly slow, so a
// fast foot/car turn does not flash a counter.
function stageText(pending) {
var text = STAGE_TEXT[(pending && pending.stage) || "start"] || STAGE_TEXT.start;
var secs = pending && pending.elapsed_s;
return (typeof secs === "number" && secs >= 3) ? text + " " + secs + "s" : text;
}
// Poll one job to completion. onDone gets the widget JSON, onFail a status string, onPending
// every 202 body (so the caller can show which stage is running, and for how long).
// A bus turn is ~45 polls through the same proxy chain L47 is about, so ONE failed poll must
// not kill the turn: anything but a 404 (the job is gone - nothing left to wait for) is retried
// until the deadline, because the job keeps running server-side regardless.
function pollJob(jobId, deadline, onDone, onFail, onPending) {
function again() {
if (Date.now() > deadline) return false;
setTimeout(function () { pollJob(jobId, deadline, onDone, onFail, onPending); }, POLL_MS);
return true;
}
$.ajax({ url: BRIDGE_BASE + "/advise/" + jobId, type: "GET", dataType: "json", cache: false })
.done(function (response, textStatus, xhr) {
if (xhr.status === 202) {  // still computing
onPending(response);
if (!again()) onFail("timeout");
return;
}
onDone(response);
})
.fail(function (xhr, status) {
if (xhr && xhr.status === 404) { onFail("job scaduto"); return; }  // nothing to poll anymore
if (!again()) onFail(status || "timeout");
});
}
// Render a completed turn: reply bubble + route lines + parking pins.
function renderTurn(response) {
if (response && response.status === "error") {
addMsg("✗ " + (response.error || "richiesta fallita"), "err");
return;
}
history = (response && response.messages) || history;  // carry multi-turn state
addMsg(replyOf(response), "bot");
var data = (response && response.data) || {};
// Prefer the multi-route list; fall back to the single top-level route for safety.
var routes = data.routes || (data.wkt ? [{ wkt: data.wkt, mode: data.mode }] : []);
if (routes.length) {
$("#advChips").empty();  // the map is about to change: the old picker now lies
try {
drawRoutes(routes, data.origin, data.destination);
if (routes.length > 1) addChoices(routes, data.origin, data.destination, data.parking);
} catch (e) { addMsg("(percorso non disegnabile: " + e.message + ")", "err"); }
// Parking pins live and die with the map content: refreshed only on a routes-bearing
// turn (drawParkingPins clears first, so a non-car turn wipes the previous car's pins).
// A routes-less turn (chat, follow-up question) leaves lines, dock AND pins alone.
// The availability is stated in the reply text, not a list.
drawParkingPins(data.parking);
// Along-route service pins: the union across routes while every line is shown (the
// chips then narrow the set per route). Same lifecycle as parking - a turn without a
// services request draws none, wiping the previous turn's.
drawServicePins(allServices(routes));
}
}
// One turn at a time: a turn now stays in flight for as long as the polling lasts (up to
// POLL_MAX_MS), and two overlapping turns would race on `history` (the later job's messages
// can land first) and on the bridge's per-turn debug.log. Enter must not start a second one.
var inFlight = false;
function send() {
if (inFlight) return;
var query = $("#advInput").val().trim();
if (!query) return;
addMsg(query, "user");
$("#advInput").val("");
inFlight = true;
$("#advSend").prop("disabled", true);
$("#advInput").prop("disabled", true);
// Transient "thinking" bubble: stays up for the whole job (POST + polling), not just the POST,
// and each poll rewrites it with the stage the bridge reports (a bus turn is otherwise a blank
// bubble for the better part of a minute).
var $thinking = addMsg(STAGE_TEXT.start, "bot thinking");
function pending(body) { $thinking.text(stageText(body)); }
function finish() {
inFlight = false;
$thinking.remove();
$("#advSend").prop("disabled", false);
$("#advInput").prop("disabled", false);
$("#advInput").focus();
}
function failed(status) {
addMsg("✗ bridge non raggiungibile (" + status + "). Controlla BRIDGE_BASE / il bridge.", "err");
finish();
}
// GPS first (cb fires exactly once, null on any failure), then POST the turn with it.
getGps(function (gps) {
$.ajax({
url: BRIDGE_BASE + "/advise",
type: "POST",
contentType: "application/json",
data: JSON.stringify({ query: query, history: history, gps: gps }),
dataType: "json"
}).done(function (job) {
if (!job || !job.job_id) { failed("no job_id"); return; }
pollJob(job.job_id, Date.now() + POLL_MAX_MS, function (response) {
// finally: a throw inside renderTurn must not leave the box disabled forever.
try { renderTurn(response); } finally { finish(); }
}, failed, pending);
}).fail(function (xhr, status) {
failed(status);
});
});
}
$("#advSend").on("click", send);
$("#advInput").on("keydown", function (e) { if (e.key === "Enter") send(); });
$("#advInput").focus();
// Prefetch: raise the permission prompt now and warm the position cache, so the FIRST
// send doesn't race the Allow click (see getGps). Result is discarded on purpose.
getGps(function (gps) { if (window.console) console.log("[advisor] gps prefetch: " + (gps ? "ok" : "unavailable")); });
});
</script>
</body>
</html>
