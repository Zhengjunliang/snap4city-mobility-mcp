<!DOCTYPE html>
<!--
Snap4City mobility advisor - dashboard front-end (Step 2: NL chat box + MCP bridge).
Paste this whole file into a widgetExternalContent (CKEditor, "Enable CKEditor" on).
NOTE: no leading indentation / blank lines on purpose - CKEditor renders leading
tabs/spaces as content, so this file is kept flat and paste-ready (see CLAUDE.md rule 9).
It is a natural-language chat box: the question is POSTed to the FastAPI bridge (api.py,
which wraps run_advisor on the JupyterHub) and the reply + route come back as widget JSON
{status, request_type, data, messages}. The reply bubble is messages[-1].content; the
routes are data.routes (one per travel mode), drawn on a sibling widgetMap.
MULTIPLE MODES: when the user does not say walk/drive/bus, the backend routes ALL of foot,
car and public transport and returns data.routes. We draw one vivid line per mode (foot green,
car blue, bus orange) - there is no primary/alternate dimming and no legend. (Every route
carries start/finish icons - omitting them on some trajectories crashed the widget, so the
markers overlap at the shared O/D.) When only one route comes back (mode specified, or a mode
empty in a ZTL / very short trip / no PT for that OD), a single line is drawn. (The bus line is
a single vehicle=bus road line; a true foot+bus multimodal split is deferred - no per-leg stop
coordinates are available. Line width is also left untouched - an unsupported field crashes
the widget, same L30 lesson; revisit after a real-machine test.)
HOW THE MAP DRAWS: the widgetMap's addCustomTrajectory does NOT paint a raw polyline - it
routes through waypoints with Snap4City's own graphhopper. We feed the precise geocoded
origin/destination (data.origin/data.destination) as the two waypoints - pinning the markers on
the real civic address instead of the routing service's road-snapped WKT endpoint (which drifts
~27 m up the street); the WKT endpoints are only a fallback. Each waypoint carries a graphhopper
mode whose `type` is the front-end vehicle name (foot/car/bus, NOT the MCP routetype); the map
routes between them.
Per-point `mode` is required and `type` must be foot/car/bus or the map crashes in
addCustomTrajectoryToMap. (Feeding the full downsampled WKT as many waypoints + a
drawMethod:"custom" also crashed it - 2 endpoints, no drawMethod, is the shape that works.)
PARKING (car routes): data.parking lists free car parks near the destination; we show a compact
list under the reply and plot each on the map via the widgetMap "addSelectorPin" event (one per
serviceUri, Snap4City's own pin pattern). The pin payload + clear event are real-machine-calibrated
against the PA.php parking dashboard (L30); the list always renders even if the pins balk.
Configure MAP_WIDGET_ID and BRIDGE_BASE below.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<style>
html, body { height: 100%; margin: 0; }
.adv { font-family: Arial, Helvetica, sans-serif; color: #e8ecf4; padding: 8px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
.adv #advChat { flex: 1; overflow-y: auto; min-height: 120px; padding-right: 4px; }
.adv .msg { margin: 6px 0; padding: 7px 10px; border-radius: 10px; font-size: 13px; line-height: 1.35; max-width: 90%; white-space: pre-wrap; word-wrap: break-word; }
.adv .msg.user { background: #1f2a44; border: 1px solid #f5c518; color: #f5c518; margin-left: auto; }
.adv .msg.bot { background: #28324d; border: 1px solid #3a4564; }
.adv .msg.err { background: #3a2330; border: 1px solid #ff8a8a; color: #ff8a8a; }
.adv .row { display: flex; gap: 6px; margin-top: 8px; }
.adv #advInput { flex: 1; box-sizing: border-box; padding: 8px; border: none; border-radius: 4px; font-size: 13px; }
.adv #advSend { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; background: #f5c518; color: #1f2a44; }
.adv #advSend:disabled { opacity: .5; cursor: default; }
.adv .msg.park { background: #1d3326; border: 1px solid #3a6b4a; }
.adv .park .ph { font-weight: bold; margin-bottom: 4px; }
.adv .park .pi { display: flex; justify-content: space-between; gap: 10px; padding: 2px 0; }
.adv .park .pi .pn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.adv .park .pi .pf { color: #7fe0a0; white-space: nowrap; }
.adv .park .pi .pf.na { color: #9aa6b8; }
</style>
</head>
<body>
<div class="adv">
<div id="advChat"></div>
<div class="row">
<input id="advInput" type="text" placeholder='es. "da Piazza del Duomo a Santa Croce a piedi"' autocomplete="off">
<button id="advSend" type="button">Invia</button>
</div>
</div>
<script>
$(function () {
'use strict';
// ---- Configuration (fill these on your dashboard) -----------------------
var MAP_WIDGET_ID = "w_Map_5183_widgetMap46852";  // id of the widgetMap on this dashboard
// FastAPI bridge (api.py) base URL, as reachable FROM THE BROWSER. On a dashboard this is
// whatever the deployment exposes (jupyter-server-proxy path or a same-origin proxy);
// TODO set this once the browser->bridge reachability is decided. Local dev: localhost.
var BRIDGE_BASE = "https://www.snap4city.org/jupyterhub/user/mobilityadvisor/proxy/8010";
// One fixed trajectory id per vehicle so a re-draw replaces that line, and every turn
// we clear all of them (a turn with only foot must wipe a stale car line, and vice versa).
var TRAJ_IDS = { foot: "advisorRoute_foot", car: "advisorRoute_car", bus: "advisorRoute_bus" };
var ICON_BASE = "https://www.snap4city.org/snap4cityWebAppTuscany/img/mapicons/ita/";
var ICONS = { start: ICON_BASE + "FirstStopOfRoute.png", finish: ICON_BASE + "LastStopOfRoute.png" };
// Parking pins (car routes): the widgetMap "addSelectorPin" event plots a service by its
// km4city serviceUri (queryType "Default") - Snap4City's own code fires one per pin in a loop,
// so we do the same (one event per car park). REAL-MACHINE NOTE (L30): the exact passedData
// fields + the SuperServiceMap base + any clear-pins event must be confirmed against a working
// PA.php payload via DevTools; until then this is the documented shape, wrapped in try/catch so
// a mismatch never breaks the chat. The parking list in the chat always renders regardless.
var KB_SUPERSERVICEMAP = "https://www.disit.org/superservicemap/api/v1/";
var PARK_PIN = { color1: "#1e66ff", color2: "#1e66ff", pinattr: "square" };
// One vivid color per vehicle (foot green, car blue, bus orange). Every drawn route uses
// its mode color; there is no primary/alternate dimming. The color value fed to a leg MUST
// be an array - a single string makes the line invisible. (Line width is left alone: the
// widgetMap may not support a width field and L30 warns unsupported fields crash it.)
var MODE_COLORS = { foot: "#32cd32", car: "#1e66ff", bus: "#ff7f0e" };
// ---- State --------------------------------------------------------------
var history = [];  // conversation messages carried turn to turn (run_advisor contract)
// ---- Chat UI ------------------------------------------------------------
function addMsg(text, kind) {
var $m = $("<div>").addClass("msg " + kind).text(text);
$("#advChat").append($m);
$("#advChat").scrollTop($("#advChat")[0].scrollHeight);
return $m;
}
// The advisor's own reply: the last assistant turn's content (OpenAI standard); no
// hardcoded route formatting - respond already phrased distance/ETA into the text.
function replyOf(response) {
var msgs = response.messages || [];
for (var i = msgs.length - 1; i >= 0; i--) {
if (msgs[i].role === "assistant" && typeof msgs[i].content === "string" && msgs[i].content.trim()) {
return msgs[i].content.trim();
}
}
return "(nessuna risposta)";
}
// ---- Map drawing (Snap4City graphhopper via addCustomTrajectory) ---------
// The MCP routetype (foot_shortest/foot_quiet/car/public_transport) maps to the
// front-end graphhopper vehicle name the map expects.
function vehicleOf(mode) {
if (mode === "car") return "car";
if (mode === "public_transport") return "bus";
return "foot";  // foot_shortest / foot_quiet / unset
}
function nowLocalDatetime() {
var d = new Date(), p = function (n) { return String(n).padStart(2, "0"); };
return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + "T" + p(d.getHours()) + ":" + p(d.getMinutes());
}
// WKT is "LINESTRING(lng lat, ...)"; the map wants {lat, lng}, so swap (coord-order trap).
function parseWktLine(wkt) {
var m = /LINESTRING\s*\(([^)]*)\)/i.exec(wkt || "");
if (!m) return [];
return m[1].split(",").map(function (pair) {
var xy = pair.trim().split(/\s+/);
return { lat: parseFloat(xy[1]), lng: parseFloat(xy[0]) };
}).filter(function (p) { return isFinite(p.lat) && isFinite(p.lng); });
}
// The widget runs in an iframe; the dashboard (and its widgets) live in parent.
function trigger(payload) {
if (window.parent && window.parent.$) window.parent.$("body").trigger(payload);
else throw new Error("dashboard host not reachable");
}
// Wipe every per-vehicle trajectory so the previous turn leaves nothing behind (a foot-only
// answer must erase last turn's car line, and vice versa).
function clearAllTrajectories() {
$.each(TRAJ_IDS, function (vehicle, id) {
trigger({
type: "removeCustomTrajectory",
target: MAP_WIDGET_ID,
passedData: [{ id: id, eventType: "Trajectory" }]
});
});
}
// Build one trajectory object for a route by feeding two endpoints as graphhopper waypoints
// and letting the widgetMap route between them (the native What-If pattern, proven to draw).
// The endpoints are the precise geocoded origin/destination (markers land on the real civic
// address); the WKT endpoints are only a fallback. Feeding the full downsampled WKT as 12
// waypoints + drawMethod:"custom" crashed the widget's addCustomTrajectoryToMap (Cannot read
// ... 'length'); 2 endpoints + no drawMethod is the shape that works. color is the line color
// (one vivid shade per mode). EVERY point must carry an `icon` (start on the first, finish on
// the last) - omitting it on some trajectories crashed addCustomTrajectoryToMap (Cannot read
// ... 'length', the L30 signature), so all routes get icons; since they share the same O/D the
// markers overlap. Returns the object - the caller batches all routes into ONE event (see
// drawRoutes).
function buildTraj(route, color, origin, destination) {
// Prefer the precise geocoded endpoints (origin/destination from the backend, pinned on the
// real civic address) so the markers don't drift to the routing service's road-snapped WKT
// endpoint (~27 m up the street). Fall back to the WKT endpoints when O/D is absent (the
// top-level data.wkt single-route path).
var coords;
if (origin && destination) {
coords = [origin, destination];
} else {
var line = parseWktLine(route.wkt);
if (line.length < 2) throw new Error("route geometry has < 2 points");
coords = [line[0], line[line.length - 1]];  // start + finish only
}
var vehicle = vehicleOf(route.mode), startDatetime = nowLocalDatetime();
// Each waypoint needs a graphhopper mode; type MUST be foot/car/bus (not foot_shortest)
// or addCustomTrajectoryToMap crashes.
var points = coords.map(function (gps, i) {
var pt = {
optionalhtmltrajpopup: "",
mode: { routing: { graphhopper: { type: vehicle, startDatetime: startDatetime, weighting: "fastest" } } },
color: [color],
position: { serviceUri: "", gps: gps }
};
if (i === 0) pt.icon = ICONS.start;
else if (i === coords.length - 1) pt.icon = ICONS.finish;
return pt;
});
return {
id: TRAJ_IDS[vehicle] || ("advisorRoute_" + vehicle),
eventType: "Trajectory",
returnInstructionTrigger: "returnedTraj",
multipleLines: false,
points: points
};
// NOTE: do NOT add a trajectory-level `color` field here - it ALSO crashed the widget
// (same L30 signature). The line color is widget-default; the real per-line color field is
// unknown and must be captured from a working colored-trajectory payload (DevTools) before
// being fed - guessing crashes.
}
// Draw every route from the backend, one vivid line per mode (foot green / car blue / bus
// orange) - no primary/alternate distinction, no dimming. ALL trajectories go in ONE
// addCustomTrajectory event (passedData is an array): the widget replaces its whole trajectory
// layer on each event, so separate events would let the last wipe the others. The markers use
// the precise geocoded origin/destination so every mode's start/finish pins land on the real
// address (and overlap exactly). One route (a mode empty / specified) just draws a single line.
function drawRoutes(routes, origin, destination) {
clearAllTrajectories();
var trajs = routes.map(function (route) {
var color = MODE_COLORS[vehicleOf(route.mode)] || MODE_COLORS.foot;
return buildTraj(route, color, origin, destination);
});
trigger({ type: "addCustomTrajectory", target: MAP_WIDGET_ID, passedData: trajs });
}
// ---- Parking near the destination (car routes) --------------------------
// Compact list under the reply: name + distance + free spaces ("post. n/d" when live
// availability is not loaded server-side - the agreed degraded case). Always renders when
// data.parking is present, independent of the map pins below.
function renderParking(parking) {
if (!parking || !parking.length) return;
var $m = $("<div>").addClass("msg bot park");
$("<div>").addClass("ph").text("Parcheggi vicino alla destinazione:").appendTo($m);
parking.forEach(function (p) {
var dist = (typeof p.distance_km === "number") ? (Math.round(p.distance_km * 1000) + " m") : "";
var hasFree = (p.free_spaces !== null && p.free_spaces !== undefined);
var $row = $("<div>").addClass("pi");
$("<span>").addClass("pn").text((p.name || "Parcheggio") + (dist ? " · " + dist : "")).appendTo($row);
$("<span>").addClass("pf" + (hasFree ? "" : " na")).text(hasFree ? (p.free_spaces + " liberi") : "post. n/d").appendTo($row);
$m.append($row);
});
$("#advChat").append($m);
$("#advChat").scrollTop($("#advChat")[0].scrollHeight);
}
// Map pins via addSelectorPin (one event per car park, by serviceUri - Snap4City's own widget
// loops one event per pin, so we do too). REAL-MACHINE NOTE (L30): the passedData fields, the
// SuperServiceMap base, and the clear-pins event are the documented/likely shape but UNVERIFIED
// against a live PA.php payload - confirm via DevTools. All wrapped in try/catch so the chat
// list above is never affected if the widget balks. lastParkingUris lets us clear last turn's
// pins (a foot follow-up must wipe the previous car parking pins).
var lastParkingUris = [];
function clearParkingPins() {
try {
lastParkingUris.forEach(function (uri) {
trigger({ type: "removeSelectorPin", target: MAP_WIDGET_ID, passedData: { query: KB_SUPERSERVICEMAP + "?serviceUri=" + uri } });
});
} catch (e) { /* unverified clear path (no remove event in widget source); ignore */ }
lastParkingUris = [];
}
function drawParkingPins(parking) {
clearParkingPins();
if (!parking || !parking.length) return;
try {
parking.forEach(function (p) {
if (!p.uri) return;
trigger({ type: "addSelectorPin", target: MAP_WIDGET_ID, passedData: {
query: KB_SUPERSERVICEMAP + "?serviceUri=" + p.uri, queryType: "Default",
desc: p.name || "Parcheggio", color1: PARK_PIN.color1, color2: PARK_PIN.color2,
pinattr: PARK_PIN.pinattr, display: "pins"
} });
lastParkingUris.push(p.uri);
});
} catch (e) { /* L30: addSelectorPin shape unverified; chat list still shows parking */ }
}
// ---- Send a turn to the bridge ------------------------------------------
function send() {
var query = $("#advInput").val().trim();
if (!query) return;
addMsg(query, "user");
$("#advInput").val("");
$("#advSend").prop("disabled", true);
$.ajax({
url: BRIDGE_BASE + "/advise",
type: "POST",
contentType: "application/json",
data: JSON.stringify({ query: query, history: history }),
dataType: "json"
}).done(function (response) {
if (response && response.status === "error") {
addMsg("✗ " + (response.error || "richiesta fallita"), "err");
} else {
history = (response && response.messages) || history;  // carry multi-turn state
addMsg(replyOf(response), "bot");
var data = (response && response.data) || {};
// Prefer the multi-route list; fall back to the single top-level route for safety.
var routes = data.routes || (data.wkt ? [{ wkt: data.wkt, mode: data.mode }] : []);
if (routes.length) {
try { drawRoutes(routes, data.origin, data.destination); }
catch (e) { addMsg("(percorso non disegnabile: " + e.message + ")", "err"); }
}
// Parking (car routes). Clear last turn's pins unconditionally so a non-car follow-up wipes
// them; then render the list + pins when present (independent of routes - parking shows even
// if the car route itself came back empty).
clearParkingPins();
renderParking(data.parking);
drawParkingPins(data.parking);
}
}).fail(function (xhr, status) {
addMsg("✗ bridge non raggiungibile (" + status + "). Controlla BRIDGE_BASE / il bridge.", "err");
}).always(function () {
$("#advSend").prop("disabled", false);
$("#advInput").focus();
});
}
$("#advSend").on("click", send);
$("#advInput").on("keydown", function (e) { if (e.key === "Enter") send(); });
$("#advInput").focus();
});
</script>
</body>
</html>
